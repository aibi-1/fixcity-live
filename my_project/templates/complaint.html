<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200..1000&display=swap" rel="stylesheet">
    <style>* { font-family: 'Nunito', sans-serif; }</style>
    <title>Жалобы — FixCity Bishkek</title>
</head>
<body class="bg-[#0a0a0a] text-white">

    <header class="flex justify-between items-center px-6 py-3 border-b border-gray-800 sticky top-0 bg-[#0a0a0a]/90 backdrop-blur z-20">
        <a href="/" class="text-white font-bold text-[23px]">FixCity Bishkek</a>
        <nav class="bg-[#1C1C1C] border border-[#3B3B3B] w-[270px] p-3 rounded-[14px] pl-[20px]">
            <a href="/map" class="text-[#DEDEDE] ml-[13px] hover:scale-110 transition duration-300 hover:text-[#248DF0]">Карта</a>
            <a href="/route" class="text-[#DEDEDE] ml-[10px] hover:scale-110 transition duration-300 hover:text-[#248DF0]">Жалобы</a>
            <a href="/news" class="text-[#DEDEDE] ml-[10px] hover:scale-110 transition duration-300 hover:text-[#248DF0]">Маршрут</a>
        </nav>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-10">
        <h1 class="text-3xl font-bold mb-6">Оставить жалобу</h1>
        <p class="text-gray-400 mb-8">Сообщите о проблеме в вашем районе — мы передадим информацию ответственным службам.</p>

        <form class="space-y-5" onsubmit="submitComplaint(event)">
            <div>
                <label class="block text-sm text-gray-400 mb-1">Тип проблемы</label>
                <select class="w-full bg-[#1C1C1C] border border-[#3B3B3B] p-3 rounded-xl text-white outline-none focus:border-[#236ADE]">
                    <option>Яма на дороге</option>
                    <option>Сломанный светофор</option>
                    <option>Мусор</option>
                    <option>Освещение</option>
                    <option>Другое</option>
                </select>
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Адрес</label>
                <input type="text" placeholder="Например: ул. Киевская 100" class="w-full bg-[#1C1C1C] border border-[#3B3B3B] p-3 rounded-xl text-white outline-none focus:border-[#236ADE]">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Описание</label>
                <textarea rows="4" placeholder="Опишите проблему подробнее..." class="w-full bg-[#1C1C1C] border border-[#3B3B3B] p-3 rounded-xl text-white outline-none focus:border-[#236ADE]"></textarea>
            </div>
            <button type="submit" class="bg-[#236ADE] text-white py-3 px-8 rounded-xl font-bold hover:bg-[#598AD4] transition shadow-[0_0_15px_rgba(35,106,222,0.6)]">
                Отправить жалобу
            </button>
        </form>

        <div id="successMsg" class="hidden mt-6 p-4 bg-green-900/30 border border-green-700 rounded-xl text-green-400">
            ✅ Жалоба отправлена! Спасибо за вашу активность.
        </div>
    </main>

    <script>
        function submitComplaint(e) {
            e.preventDefault();
            document.getElementById('successMsg').classList.remove('hidden');
            e.target.reset();
        }
    </script>
</body>
</html>
